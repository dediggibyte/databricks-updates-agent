name: Weekly Databricks one-pagers

# Every Tuesday 07:00 UTC + on-demand runs for backfilling past release notes.
on:
  schedule:
    - cron: "0 7 * * 2"          # Tuesdays 07:00 UTC
  workflow_dispatch:
    inputs:
      mode:
        description: "weekly (new notes), backfill (past notes), or reenrich (refresh all existing)"
        type: choice
        default: weekly
        options: [weekly, backfill, reenrich]
      from_month:
        description: "Backfill start month YYYY-MM (backfill mode only)"
        required: false
      to_month:
        description: "Backfill end month YYYY-MM (backfill mode only)"
        required: false
      refresh:
        description: "Re-fetch & overwrite existing notes (weekly/backfill) — updates doc links and re-enriches"
        type: boolean
        default: false
      model:
        description: "Override model id (optional, e.g. claude-opus-4-8)"
        required: false

permissions:
  contents: write        # commit refreshed data/ (site/ is never committed)
  pages: write
  id-token: write
  models: read           # free GitHub Models inference

concurrency:
  group: onepagers
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          python -m playwright install --with-deps chromium

      - name: Run pipeline
        env:
          # Free GitHub Models auth — no user-provided key required.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: only set if you add an ANTHROPIC_API_KEY secret and switch
          # llm.provider to "anthropic" in config.yaml.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          MODEL_FLAG=""
          if [ -n "${{ github.event.inputs.model }}" ]; then
            MODEL_FLAG="--model ${{ github.event.inputs.model }}"
          fi
          REFRESH_FLAG=""
          if [ "${{ github.event.inputs.refresh }}" = "true" ]; then
            REFRESH_FLAG="--refresh"
          fi
          if [ "${{ github.event.inputs.mode }}" = "backfill" ]; then
            python -m dbx_onepager $MODEL_FLAG backfill \
              --from "${{ github.event.inputs.from_month }}" \
              --to "${{ github.event.inputs.to_month }}" $REFRESH_FLAG
          elif [ "${{ github.event.inputs.mode }}" = "reenrich" ]; then
            python -m dbx_onepager $MODEL_FLAG enrich --force
          else
            python -m dbx_onepager $MODEL_FLAG weekly $REFRESH_FLAG
          fi

      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh Databricks one-pagers ($(date -u +%Y-%m-%d))"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    needs: generate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
