name: Email weekly summary

# Emails the weekly digest to the Databricks COE DL and Global after every
# successful weekly pipeline run — including "no updates this week" runs.
#
# Delivery is Microsoft Graph sendMail (OAuth client credentials) — Exchange
# Online retired basic username/password SMTP auth in April 2026. Requires an
# Entra app registration with the Mail.Send APPLICATION permission (admin
# consented) and these repo secrets:
#   GRAPH_TENANT_ID / GRAPH_CLIENT_ID / GRAPH_CLIENT_SECRET / MAIL_SENDER
#
# Note: workflow_run only fires for workflows on the DEFAULT branch, and the
# `workflows:` string must exactly match weekly.yml's `name:`.
on:
  workflow_run:
    workflows: ["Weekly Databricks one-pagers"]
    types: [completed]
  workflow_dispatch:
    inputs:
      days:
        description: "Look-back window in days"
        default: "7"

permissions:
  contents: read

jobs:
  email:
    runs-on: ubuntu-latest
    # Send after successful weekly runs (incl. zero-update runs); skip on failure.
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      # workflow_run.head_sha predates the data commit the weekly run pushed,
      # so check out the branch tip instead of the triggering sha.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .        # digest needs no Playwright browsers

      - name: Build and send email digest (Microsoft Graph)
        env:
          GRAPH_TENANT_ID: ${{ secrets.GRAPH_TENANT_ID }}
          GRAPH_CLIENT_ID: ${{ secrets.GRAPH_CLIENT_ID }}
          GRAPH_CLIENT_SECRET: ${{ secrets.GRAPH_CLIENT_SECRET }}
          MAIL_SENDER: ${{ secrets.MAIL_SENDER }}
          MAIL_TO: dl-databricks-coe@diggibyte.com,Global@diggibyte.com
        run: |
          python -m dbx_onepager email-summary \
            --days "${{ inputs.days || '7' }}" \
            --out email/body.html --subject-out email/subject.txt \
            --send
