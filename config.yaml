# Databricks Update One-Pager — configuration
#
# Everything the pipeline needs is here so no code changes are required to
# retarget the source, tweak the model, or change output styling.

# --- Sources -------------------------------------------------------------
# Databricks platform release notes (AWS docs). The RSS feed drives the
# weekly incremental run; the archive base drives historical backfill.
source:
  name: "Databricks platform release notes"
  cloud: "aws"                       # aws | azure | gcp
  # RSS/Atom feed candidates for the platform release notes, tried in order.
  # The exact path is confirmed at runtime; if none resolve, the fetcher falls
  # back to scraping the index page (see fetch.fetch_new).
  rss_candidates:
    - "https://docs.databricks.com/aws/en/release-notes/product/rss.xml"
    - "https://docs.databricks.com/aws/en/release-notes/product/feed.xml"
    - "https://docs.databricks.com/feed.xml"
  # Human index page (fallback discovery source + weekly scrape target).
  index_url: "https://docs.databricks.com/aws/en/release-notes/product/"
  # Monthly archive URL pattern for backfill, e.g. .../product/2025/july
  archive_pattern: "https://docs.databricks.com/aws/en/release-notes/product/{year}/{month}"
  docs_base: "https://docs.databricks.com/aws/en/"

# --- LLM enrichment ------------------------------------------------------
llm:
  # provider: how each release note is turned into a one-pager.
  #   github-models : GitHub's FREE built-in AI, authenticated by the
  #                   GITHUB_TOKEN that Actions provides automatically — no key
  #                   for you to obtain or pay for. (default)
  #   anthropic     : Claude via ANTHROPIC_API_KEY (best quality, paid).
  #   heuristic     : no AI, no key, no network — deterministic extraction.
  # Any provider automatically falls back to `heuristic` if it errors, so the
  # pipeline always produces output.
  provider: "github-models"

  # GitHub Models settings (free path).
  github_model: "openai/gpt-4o-mini"
  github_endpoint: "https://models.github.ai/inference/chat/completions"

  # Anthropic settings (only used when provider: anthropic).
  anthropic_model: "claude-sonnet-5"

  max_tokens: 2600
  temperature: 0.2

# --- Underlying technical docs -------------------------------------------
# Each release note usually links to a feature doc ("See ..."). Fetching that
# doc lets the one-pager describe the update in real depth and link to the
# technical reference instead of the release-note page.
doc:
  fetch_underlying: true
  max_chars: 14000

# --- Rendering -----------------------------------------------------------
render:
  # Default one-pager variant: "console" (light COE app look) or "paper"
  # (navy dark alternate).
  variant: "console"
  # Also emit the alternate variant alongside the default.
  emit_alternate: true
  site_title: "Databricks Update One-Pagers"
  # Published site base URL — used for links in the weekly email digest.
  pages_url: "https://dediggibyte.github.io/databricks-updates-agent"

# --- Paths (relative to repo root) --------------------------------------
paths:
  releases: "data/releases"          # raw normalized release notes
  onepagers: "data/onepagers"        # enriched one-pager JSON
  docs: "data/docs"                  # cached underlying technical docs
  site: "site"                       # rendered HTML (GitHub Pages root)
  fixtures: "fixtures"               # offline sample notes for testing
